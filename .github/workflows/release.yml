# Reusable Workflow
name: 𝌚 Create Release
description: > 
  Gets the next semantic version from the go-semantic-release/semantic-release action using
  conventional commits and outputs it along with the Major (v#) and Minor (v#.#) versions.
  If the release-branch is set to the current branch then creates a GitHub Release with the
  PR description as release notes and adds floating tags for the Major and Minor versions.
on:
  workflow_call:
    inputs:
      release-branch:
        required: false
        type: string
        default: 'main'
        description: >
          The branch to create the release from. If the checked out branch does not match
          the release-branch then a release will not be created.
      runs-on:
        required: false
        type: string
        default: ubuntu-slim
        description: >
          Runs this workflow on the specified runner. Defaults to ubuntu-slim.
      disable-summary:
        required: false
        type: boolean
        default: false
        description: >
          Disables output of versions to the Job Summary.
    outputs:
        major-version:
            description: "Major version - 'v#'"
            value: ${{ jobs.get-next-version.outputs.major-version }}
        minor-version:
            description: "Minor version - 'v#.#'"
            value: ${{ jobs.get-next-version.outputs.minor-version }}
        semantic-version:
            description: "Semantic version - 'v#.#.#'"
            value: ${{ jobs.get-next-version.outputs.version }}
        release-type:
            description: "Release bump type - 'major', 'minor', or 'patch'"
            value: ${{ jobs.get-next-version.outputs.release-type }}
permissions:
  id-token: write
  contents: write
  actions: read
jobs:
  get-next-version:
    name: Get Versions
    runs-on: ${{ inputs.runs-on }}
    outputs:
      version: '${{ steps.semantic-release.outputs.version }}'
      major-version: '${{ steps.versions.outputs.major-version }}'
      minor-version: '${{ steps.versions.outputs.minor-version }}'
      release-type: '${{ steps.semantic-release.outputs.type }}'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: '${{ github.head_ref }}'
          fetch-depth: 0
      - name: Get Next Version
        id: semantic-release
        uses: go-semantic-release/semantic-release@v1
        with:
          no-release: true
      - name: Set Major & Minor Versions
        id: versions
        shell: bash
        env:
          SEM_VERSION: ${{ steps.semantic-release.outputs.version }}
        run: |
          major_version=$(echo ${SEM_VERSION} | awk -F. '{printf "v%d\n", $1}')
          echo "major-version=${major_version}" >> $GITHUB_OUTPUT
          minor_version=$(echo ${SEM_VERSION} | awk -F. '{printf "v%d.%d\n", $1,$2}')
          echo "minor-version=${minor_version}" >> $GITHUB_OUTPUT
      - name: Job Summary Versions
        if: ${{ !inputs.disable-summary }}
        shell: bash
        env:
          SEM_VERSION: ${{ steps.semantic-release.outputs.version }}
          MAJOR_VERSION: '${{ steps.versions.outputs.major-version }}'
          MINOR_VERSION: '${{ steps.versions.outputs.minor-version }}'
          RELEASE_TYPE: '${{ steps.semantic-release.outputs.type }}'
        run: |
          printf '## Versions\n\n' >> $GITHUB_STEP_SUMMARY
          printf "| Semantic | Major | Minor | Type |\n" >> $GITHUB_STEP_SUMMARY
          printf "|----------|-------|-------|------|\n" >> $GITHUB_STEP_SUMMARY
          printf "| $SEM_VERSION | $MAJOR_VERSION | $MINOR_VERSION | $RELEASE_TYPE |\n\n" >> $GITHUB_STEP_SUMMARY
  
  create-release:
    name: Tag and Release
    runs-on: ${{ inputs.runs-on }}
    needs: get-next-version
    if: ${{ success() && ( github.ref_name == inputs.release-branch )}}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: '${{ github.head_ref }}'
          fetch-depth: 0
      - name: Create Release from Commit
        if: ${{ success() && github.event_name == 'push' && github.ref_name == inputs.release-branch }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{needs.get-next-version.outputs.version}}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Extract PR body (everything after first blank line in commit message)
          RELEASE_NOTES=$(echo "$COMMIT_MSG" | sed '1,/^$/d')
          # Fallback to full message if no body (single-line commit)
          if [ -z "$RELEASE_NOTES" ]; then RELEASE_NOTES="$COMMIT_MSG"; fi
          gh release create "v${RELEASE_VERSION}" --title="v${RELEASE_VERSION}" --notes "$RELEASE_NOTES"
      - name: Add Major ${{needs.get-next-version.outputs.major-version}} Tag
        uses: rNimbus-com/savetag@v1
        with: 
          tag: ${{needs.get-next-version.outputs.major-version}}
      - name: Add Minor ${{needs.get-next-version.outputs.minor-version}} Tag
        uses: rNimbus-com/savetag@v1
        with: 
          tag: ${{needs.get-next-version.outputs.minor-version}}
